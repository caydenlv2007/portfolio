<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1100" height="400" rx="16" fill="url(#bg)"/>

  <text x="550" y="45" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="600" letter-spacing="1">AI RECEPTIONIST — CALL FLOW</text>
  <line x1="440" y1="55" x2="660" y2="55" stroke="#333" stroke-width="1"/>

  <!-- Step 1: Customer Calls -->
  <rect x="30" y="100" width="140" height="120" rx="12" fill="#1a1a2e" stroke="#2d5aa0" stroke-width="1.5"/>
  <text x="100" y="140" text-anchor="middle" fill="#4a9eff" font-size="28">📞</text>
  <text x="100" y="170" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Customer Calls</text>
  <text x="100" y="190" text-anchor="middle" fill="#888" font-size="10">Vapi Phone Number</text>

  <!-- Arrow 1 -->
  <line x1="170" y1="160" x2="205" y2="160" stroke="#2d5aa0" stroke-width="2" filter="url(#glow)"/>
  <polygon points="205,155 215,160 205,165" fill="#2d5aa0"/>

  <!-- Step 2: STT -->
  <rect x="215" y="100" width="140" height="120" rx="12" fill="#1a1a2e" stroke="#2d8a4e" stroke-width="1.5"/>
  <text x="285" y="140" text-anchor="middle" fill="#4adf7e" font-size="28">🎙️</text>
  <text x="285" y="170" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Speech → Text</text>
  <text x="285" y="190" text-anchor="middle" fill="#888" font-size="10">Deepgram STT</text>

  <!-- Arrow 2 -->
  <line x1="355" y1="160" x2="390" y2="160" stroke="#2d8a4e" stroke-width="2" filter="url(#glow)"/>
  <polygon points="390,155 400,160 390,165" fill="#2d8a4e"/>

  <!-- Step 3: Claude -->
  <rect x="400" y="80" width="160" height="160" rx="12" fill="#1a1a2e" stroke="#d4a04a" stroke-width="2"/>
  <text x="480" y="125" text-anchor="middle" fill="#f0c060" font-size="28">🧠</text>
  <text x="480" y="152" text-anchor="middle" fill="#ffffff" font-size="13" font-weight="700">Claude API</text>
  <text x="480" y="172" text-anchor="middle" fill="#888" font-size="10">Agentic Tool Loop</text>
  <text x="480" y="192" text-anchor="middle" fill="#666" font-size="9">check · book · find</text>
  <text x="480" y="206" text-anchor="middle" fill="#666" font-size="9">modify · cancel</text>

  <!-- Arrow 3 down to Calendar -->
  <line x1="480" y1="240" x2="480" y2="275" stroke="#d4a04a" stroke-width="2" filter="url(#glow)"/>
  <polygon points="475,275 480,285 485,275" fill="#d4a04a"/>

  <!-- Calendar -->
  <rect x="400" y="285" width="160" height="70" rx="10" fill="#1a1a2e" stroke="#8855cc" stroke-width="1.5"/>
  <text x="440" y="325" text-anchor="middle" fill="#aa77ee" font-size="20">📅</text>
  <text x="520" y="318" text-anchor="middle" fill="#ffffff" font-size="11" font-weight="600">Google Calendar</text>
  <text x="520" y="336" text-anchor="middle" fill="#888" font-size="9">Availability + Booking</text>

  <!-- Arrow 4 -->
  <line x1="560" y1="160" x2="595" y2="160" stroke="#d4a04a" stroke-width="2" filter="url(#glow)"/>
  <polygon points="595,155 605,160 595,165" fill="#d4a04a"/>

  <!-- Step 4: TTS -->
  <rect x="605" y="100" width="140" height="120" rx="12" fill="#1a1a2e" stroke="#cc5555" stroke-width="1.5"/>
  <text x="675" y="140" text-anchor="middle" fill="#ff7777" font-size="28">🔊</text>
  <text x="675" y="170" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Text → Speech</text>
  <text x="675" y="190" text-anchor="middle" fill="#888" font-size="10">ElevenLabs TTS</text>

  <!-- Arrow 5 -->
  <line x1="745" y1="160" x2="780" y2="160" stroke="#cc5555" stroke-width="2" filter="url(#glow)"/>
  <polygon points="780,155 790,160 780,165" fill="#cc5555"/>

  <!-- Step 5: SMS -->
  <rect x="790" y="100" width="140" height="120" rx="12" fill="#1a1a2e" stroke="#2d8a8a" stroke-width="1.5"/>
  <text x="860" y="140" text-anchor="middle" fill="#4adfd0" font-size="28">📱</text>
  <text x="860" y="170" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">SMS Confirm</text>
  <text x="860" y="190" text-anchor="middle" fill="#888" font-size="10">ClickSend</text>

  <!-- Arrow 6 -->
  <line x1="930" y1="160" x2="965" y2="160" stroke="#2d8a8a" stroke-width="2" filter="url(#glow)"/>
  <polygon points="965,155 975,160 965,165" fill="#2d8a8a"/>

  <!-- Step 6: Supabase -->
  <rect x="975" y="100" width="100" height="120" rx="12" fill="#1a1a2e" stroke="#3ecf8e" stroke-width="1.5"/>
  <text x="1025" y="140" text-anchor="middle" fill="#3ecf8e" font-size="28">💾</text>
  <text x="1025" y="170" text-anchor="middle" fill="#ffffff" font-size="12" font-weight="600">Supabase</text>
  <text x="1025" y="190" text-anchor="middle" fill="#888" font-size="10">Log Everything</text>

  <!-- Bottom label -->
  <text x="550" y="385" text-anchor="middle" fill="#444" font-size="10" letter-spacing="0.5">Node.js + TypeScript + Express · Deployed on Railway · Multi-tenant Architecture</text>
</svg>
