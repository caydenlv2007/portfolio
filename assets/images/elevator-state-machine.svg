<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 500" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="500" rx="16" fill="url(#bg)"/>

  <text x="450" y="42" text-anchor="middle" fill="#ffffff" font-size="18" font-weight="600" letter-spacing="1">ELEVATOR FINITE STATE MACHINE</text>
  <line x1="310" y1="52" x2="590" y2="52" stroke="#333" stroke-width="1"/>

  <!-- State 0: Calibrating -->
  <ellipse cx="450" cy="120" rx="90" ry="38" fill="#1a1a2e" stroke="#d4a04a" stroke-width="2"/>
  <text x="450" y="115" text-anchor="middle" fill="#f0c060" font-size="14" font-weight="700">CALIBRATING</text>
  <text x="450" y="133" text-anchor="middle" fill="#888" font-size="11">#0</text>

  <!-- Arrow: Calibrating → Stopped -->
  <line x1="450" y1="158" x2="450" y2="212" stroke="#d4a04a" stroke-width="2" filter="url(#glow)"/>
  <polygon points="445,212 450,222 455,212" fill="#d4a04a"/>
  <text x="520" y="190" text-anchor="middle" fill="#888" font-size="10">Calibration Done</text>

  <!-- State 1: Stopped -->
  <ellipse cx="450" cy="260" rx="85" ry="38" fill="#1a1a2e" stroke="#3ecf8e" stroke-width="2.5"/>
  <text x="450" y="255" text-anchor="middle" fill="#3ecf8e" font-size="14" font-weight="700">STOPPED</text>
  <text x="450" y="273" text-anchor="middle" fill="#888" font-size="11">#1</text>

  <!-- State 2: Move Up -->
  <ellipse cx="700" cy="260" rx="85" ry="38" fill="#1a1a2e" stroke="#4a9eff" stroke-width="1.5"/>
  <text x="700" y="255" text-anchor="middle" fill="#4a9eff" font-size="14" font-weight="700">MOVE UP</text>
  <text x="700" y="273" text-anchor="middle" fill="#888" font-size="11">#2</text>

  <!-- State 3: Move Down -->
  <ellipse cx="200" cy="260" rx="85" ry="38" fill="#1a1a2e" stroke="#cc5555" stroke-width="1.5"/>
  <text x="200" y="255" text-anchor="middle" fill="#ff7777" font-size="14" font-weight="700">MOVE DOWN</text>
  <text x="200" y="273" text-anchor="middle" fill="#888" font-size="11">#3</text>

  <!-- State 4: Moving -->
  <ellipse cx="450" cy="410" rx="85" ry="38" fill="#1a1a2e" stroke="#aa77ee" stroke-width="1.5"/>
  <text x="450" y="405" text-anchor="middle" fill="#aa77ee" font-size="14" font-weight="700">MOVING</text>
  <text x="450" y="423" text-anchor="middle" fill="#888" font-size="11">#4</text>

  <!-- Arrow: Stopped → Move Up (target above) -->
  <line x1="535" y1="255" x2="615" y2="255" stroke="#4a9eff" stroke-width="2" filter="url(#glow)"/>
  <polygon points="610,250 620,255 610,260" fill="#4a9eff"/>
  <text x="575" y="245" text-anchor="middle" fill="#888" font-size="10">Target Above</text>

  <!-- Arrow: Stopped → Move Down (target below) -->
  <line x1="365" y1="255" x2="285" y2="255" stroke="#cc5555" stroke-width="2" filter="url(#glow)"/>
  <polygon points="290,250 280,255 290,260" fill="#cc5555"/>
  <text x="325" y="245" text-anchor="middle" fill="#888" font-size="10">Target Below</text>

  <!-- Arrow: Move Up → Moving -->
  <line x1="650" y1="295" x2="520" y2="390" stroke="#aa77ee" stroke-width="2" filter="url(#glow)"/>
  <polygon points="525,385 518,394 528,393" fill="#aa77ee"/>
  <text x="620" y="345" text-anchor="middle" fill="#888" font-size="10">P > deadband</text>

  <!-- Arrow: Move Down → Moving -->
  <line x1="250" y1="295" x2="380" y2="390" stroke="#aa77ee" stroke-width="2" filter="url(#glow)"/>
  <polygon points="375,385 382,394 372,393" fill="#aa77ee"/>
  <text x="280" y="345" text-anchor="middle" fill="#888" font-size="10">P > deadband</text>

  <!-- Arrow: Moving → Stopped (PID in window) -->
  <line x1="450" y1="372" x2="450" y2="298" stroke="#3ecf8e" stroke-width="2" stroke-dasharray="6,3" filter="url(#glow)"/>
  <polygon points="445,302 450,292 455,302" fill="#3ecf8e"/>
  <text x="555" y="340" text-anchor="middle" fill="#888" font-size="10">PID in HOLD window</text>

  <!-- Legend -->
  <rect x="30" y="430" width="12" height="12" rx="2" fill="#3ecf8e"/>
  <text x="48" y="441" fill="#888" font-size="10">Hold state (motor = 3191)</text>
  <rect x="30" y="450" width="12" height="12" rx="2" fill="#aa77ee"/>
  <text x="48" y="461" fill="#888" font-size="10">PI controller active</text>
  <rect x="30" y="470" width="12" height="12" rx="2" fill="#d4a04a"/>
  <text x="48" y="481" fill="#888" font-size="10">First scan cycle init</text>

  <!-- Bottom label -->
  <text x="450" y="490" text-anchor="middle" fill="#444" font-size="10" letter-spacing="0.5">Omron CP1H · Ladder Logic + Structured Text · ENMT211 University of Canterbury</text>
</svg>
